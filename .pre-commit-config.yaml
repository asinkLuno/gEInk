repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff-format
        entry: ruff format
        language: system
        types: [python]

  - repo: local
    hooks:
      - id: pyright
        name: basedpyright
        entry: .venv/bin/basedpyright --pythonversion 3.11
        language: system
        pass_filenames: false

  - repo: local
    hooks:
      - id: vulture
        name: vulture
        entry: vulture
        args: ["src/", "--min-confidence", "80", "--exclude", ".venv"]
        language: system
        pass_filenames: false

  - repo: local
    hooks:
      - id: radon
        name: radon
        entry: uvx
        args: ["radon", "cc", "src/", "--min=B"]
        language: system
        pass_filenames: false

  - repo: local
    hooks:
      - id: autoflake
        name: autoflake
        entry: autoflake
        args: [--expand-star-imports, --remove-all-unused-imports, --in-place]
        language: system
        types: [python]

  - repo: local
    hooks:
      - id: isort
        name: isort
        entry: isort
        args: [--profile, black]
        language: system
        types: [python]

  - repo: local
    hooks:
      - id: trailing-whitespace
        name: trailing-whitespace
        entry: trailing-whitespace-fixer
        language: system
      - id: end-of-file-fixer
        name: end-of-file-fixer
        entry: end-of-file-fixer
        language: system
      - id: check-yaml
        name: check-yaml
        entry: check-yaml
        language: system
        types: [yaml]

  - repo: local
    hooks:
      - id: pangu
        name: pangu
        entry: pangu
        language: system
        types: [markdown]
      - id: mdformat
        name: mdformat
        entry: mdformat
        language: system
        types: [markdown]

  - repo: local
    hooks:
      - id: clang-format
        name: clang-format (Arduino)
        entry: clang-format
        args: [-i]
        language: system
        files: ^ESPSlider/.*\.(ino|h)$
